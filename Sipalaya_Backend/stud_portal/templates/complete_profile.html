{% extends "protected_page.html" %}
{% block content %}
<style>
    .profile-container {
    max-width: 600px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    font-weight: bold;
    margin-bottom: 5px;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
}

.btn {
    display: block;
    width: 100%;
    background: #007bff;
    color: white;
    padding: 10px;
    text-align: center;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.btn:hover {
    background: #0056b3;
}

</style>
<div class="profile-container">
    <h2>Complete Your Profile</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="full_name">Full Name:</label>
            {{ form.full_name }}
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            {{ form.email }}
        </div>
        <div class="form-group">
            <label for="phone">Phone:</label>
            {{ form.phone }}
        </div>
        <div class="form-group">
            <label for="address">Address:</label>
            {{ form.address }}
        </div>
        <div class="form-group">
            <label for="gender">Gender:</label>
            {{ form.gender }}
        </div>
        <div class="form-group">
            <label for="role">Choose Role</label>
            <select name="role" required>
                {% for value, label in role_choices %}
                    <option value="{{ value }}" {% if role == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        
        <button type="submit" class="btn">Save</button>
    </form>
</div>
{% endblock %}
