{% extends 'protected_page.html' %}
{% block title %}About Us{% endblock %}

{% block content %}
    <div class="text-center">
        <h1>About Us</h1>
        <p>Learn more about our company.</p>
    </div>
    <style>
        .about-container {
            text-align: center;
            padding: 50px;
        }
        
        .about-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .about-section img {
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        @media (min-width: 1024px) {
            .about-section {
                flex-direction: row;
                text-align: left;
            }
            .about-section img {
                margin-right: 20px;
            }
        }
        </style>
        
{% endblock %}
