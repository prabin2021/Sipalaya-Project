{% extends 'protected_page.html' %}
{% block title %}Thank You{% endblock %}

{% block content %}
<style>
    .back-to-home{
text-align: center;
align-items: center;
}

/* Thank you page styling */
.thank-you {
    background-color: #f0f0f0;
    height: 100vh; /* Full screen height */
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Arial', sans-serif;
}

.thank-you-message {
    background-color: #fff;
    padding: 40px;
    text-align: center;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    max-width: 500px;
    width: 100%;
    animation: fadeIn 1s ease-in-out;
}

.thank-you-message h1 {
    font-size: 2.5rem;
    color: #6c5ce7;
    margin-bottom: 20px;
    font-weight: 600;
}

.thank-you-message p {
    font-size: 1.2rem;
    color: #333;
    margin-bottom: 30px;
}

.go-home-btn {
    background-color: #6c5ce7;
    color: white;
    padding: 15px 30px;
    text-decoration: none;
    font-size: 1.1rem;
    border-radius: 30px;
    display: inline-block;
    transition: background-color 0.3s ease;
}

.go-home-btn:hover {
    background-color: #5a4cd1; /* Darker purple on hover */
}

</style>
    <section class="thank-you">
        <div class="thank-you-message">
            <h1>Thank you for contacting us!</h1>
            <p>We will get back to you soon.</p>
            <a href="{% if user.is_authenticated %}{% url 'protected_page' %}{% else %}{% url 'homepage' %}{% endif %}" class="go-home-btn">Go to Home</a>
        </div>
    </section>
{% endblock %}
