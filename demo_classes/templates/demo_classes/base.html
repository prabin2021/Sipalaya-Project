{% extends 'base.html' %}

{% block title %}Demo Classes{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-12">
            <h1 class="mb-4">{% block page_title %}{% endblock %}</h1>
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            {% block demo_content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}
